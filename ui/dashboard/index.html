<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jobsift Dashboard</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3250;
    --accent: #5b7fff;
    --accent2: #7c5cfc;
    --text: #e8eaf6;
    --muted: #8892b0;
    --grade-a: #22d47a;
    --grade-b: #e8a0ff;
    --grade-c: #f5a623;
    --grade-d: #e05252;
    --fresh: #22d47a;
    --ripe: #5b7fff;
    --open: #8892b0;
    --stale: #f5a623;
    --ghost: #e05252;
    --flag: #f5a623;
    --tier1: #f5a623;
    --tier2: #8892b0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* Scrollbars themed to the app palette */
  * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  ::-webkit-scrollbar-corner { background: var(--bg); }

  /* ── Drop zone ──────────────────────────────────── */
  #dropzone {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 20px;
    padding: 40px;
  }
  #dropzone h1 { font-size: 20px; font-weight: 700; }
  #dropzone p  { color: var(--muted); font-size: 13px; text-align: center; }

  #drop-target {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 48px 64px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    color: var(--muted);
    font-size: 13px;
  }
  #drop-target:hover, #drop-target.drag-over {
    border-color: var(--accent);
    background: rgba(91,127,255,0.06);
    color: var(--text);
  }
  #drop-target .drop-icon { font-size: 36px; display: block; margin-bottom: 12px; }
  #file-input { display: none; }

  .browse-btn {
    margin-top: 12px;
    display: inline-block;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 8px 20px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }
  .browse-btn:hover { background: #4a6ee0; }

  #error-msg {
    display: none;
    color: var(--grade-d);
    background: rgba(224,82,82,0.1);
    border: 1px solid rgba(224,82,82,0.3);
    border-radius: 6px;
    padding: 10px 16px;
    font-size: 13px;
    max-width: 500px;
    text-align: center;
  }

  /* ── Dashboard ──────────────────────────────────── */
  #dashboard { display: none; }

  header {
    background: linear-gradient(135deg, #1a1d27 0%, #22263a 100%);
    border-bottom: 1px solid var(--border);
    padding: 24px 32px 20px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
  header .meta {
    margin-top: 6px;
    color: var(--muted);
    font-size: 13px;
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
  }

  .reload-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
    align-self: flex-start;
  }
  .reload-btn:hover { border-color: var(--accent); color: var(--accent); }

  .search-url {
    margin: 16px 32px 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .search-url a { color: var(--accent); text-decoration: none; word-break: break-all; }
  .search-url a:hover { text-decoration: underline; }
  .search-url strong { color: var(--text); white-space: nowrap; }

  .stats-bar {
    display: flex;
    gap: 12px;
    padding: 16px 32px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }
  .stat-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .stat-chip .val { font-weight: 700; font-size: 13px; color: var(--text); }

  /* ── Filter bar ─────────────────────────────────── */
  .filter-bar {
    display: flex;
    gap: 28px;
    padding: 10px 32px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-group {
    display: flex;
    gap: 12px;
    align-items: center;
    font-size: 12px;
  }
  .filter-group > span {
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-size: 10px;
    color: var(--muted);
    white-space: nowrap;
  }
  .filter-group label {
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    color: var(--text);
    font-size: 12px;
    user-select: none;
  }
  .filter-group input[type=checkbox],
  .filter-group input[type=radio] { accent-color: var(--accent); cursor: pointer; }

  .track-pill-REM { color: #7de8b8; }
  .track-pill-IRL { color: #f5c46a; }
  .track-pill-ADD { color: #8fa8ff; }

  /* ── Section ────────────────────────────────────── */
  .section { padding: 20px 32px 32px; }

  .section-header {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    padding: 24px 0 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-header .pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 2px 8px;
    font-size: 11px;
    color: var(--muted);
    text-transform: none;
    letter-spacing: 0;
  }
  .section-header .count {
    margin-left: auto;
    font-size: 11px;
    color: var(--muted);
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
  }

  /* ── Tab bar ────────────────────────────────────── */
  .tab-bar {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    padding: 9px 18px;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    font-family: inherit;
    transition: color 0.15s, border-color 0.15s;
    display: flex;
    align-items: center;
    gap: 7px;
    white-space: nowrap;
  }
  .tab-btn.active  { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-btn:hover:not(.active) { color: var(--text); }
  .tab-count {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1px 6px;
    font-size: 10px;
    color: var(--muted);
    font-weight: 400;
  }

  /* ── Scrollable table wrapper ────────────────────── */
  .table-scroll {
    max-height: 500px;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 8px 8px;
  }
  .table-scroll::-webkit-scrollbar { width: 6px; }
  .table-scroll::-webkit-scrollbar-track { background: transparent; }
  .table-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .table-scroll::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  .table-scroll table { width: 100%; border-collapse: collapse; }

  /* Sticky header inside scroll */
  .table-scroll thead th {
    position: sticky;
    top: 0;
    z-index: 2;
    background: var(--surface2);
    color: var(--muted);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    padding: 10px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    user-select: none;
  }
  .table-scroll thead th.sortable { cursor: pointer; }
  .table-scroll thead th.sortable:hover { color: var(--text); }
  .sort-icon { margin-left: 4px; opacity: 0.35; font-size: 10px; }
  th.sort-active .sort-icon { opacity: 1; color: var(--accent); }

  tbody tr.job-row {
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
  }
  tbody tr.job-row:hover    { background: rgba(91,127,255,0.06); }
  tbody tr.job-row.expanded { background: rgba(91,127,255,0.08); }
  tbody td { padding: 11px 12px; vertical-align: middle; }

  .company-name  { font-weight: 600; color: var(--text); white-space: nowrap; }
  .role-title    { color: var(--accent); font-weight: 500; font-size: 13px; }
  .location-text { color: var(--muted); font-size: 12px; }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    border-radius: 4px;
    padding: 2px 7px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  .grade-A { background: rgba(34,212,122,0.15);  color: var(--grade-a); border: 1px solid rgba(34,212,122,0.3); }
  .grade-B { background: rgba(232,160,255,0.12); color: var(--grade-b); border: 1px solid rgba(232,160,255,0.3); }
  .grade-C { background: rgba(245,166,35,0.15);  color: var(--grade-c); border: 1px solid rgba(245,166,35,0.3); }

  .cap-arrow { font-size: 9px; opacity: 0.75; }

  /* Track badges */
  .track-REM { background: rgba(34,212,122,0.12); color: #7de8b8; border: 1px solid rgba(34,212,122,0.2); }
  .track-IRL { background: rgba(245,166,35,0.12); color: #f5c46a; border: 1px solid rgba(245,166,35,0.2); }
  .track-ADD { background: rgba(91,127,255,0.12); color: #8fa8ff; border: 1px solid rgba(91,127,255,0.2); }

  /* Work type badges */
  .type-remote   { background: rgba(34,212,122,0.08); color: #7de8b8; border: 1px solid rgba(34,212,122,0.2); font-weight: 500; }
  .type-hybrid   { background: rgba(91,127,255,0.08); color: #8fa8ff; border: 1px solid rgba(91,127,255,0.2); font-weight: 500; }
  .type-inperson { background: rgba(245,166,35,0.08); color: #f5c46a; border: 1px solid rgba(245,166,35,0.2); font-weight: 500; }

  /* Posted age coloring */
  .posted-Fresh   { color: var(--fresh); }
  .posted-Ripe    { color: var(--ripe);  }
  .posted-Open    { color: var(--open);  }
  .posted-Stale   { color: var(--stale); font-style: italic; }
  .posted-Ghost   { color: var(--ghost); font-style: italic; }
  .posted-Unknown { color: var(--muted); }

  .salary         { color: var(--text); white-space: nowrap; font-size: 13px; }
  .salary.unknown { color: var(--muted); font-style: italic; }

  /* ── Source tabs (Jobright / ATS Direct) ──────────── */
  .source-tab-bar { display: flex; gap: 4px; align-items: center; }
  .source-tab {
    padding: 4px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .source-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .source-tab.active .tab-count { color: #fff; }
  .source-tab .tab-count {
    display: inline-block;
    background: rgba(255,255,255,0.18);
    border-radius: 10px;
    padding: 0 5px;
    margin-left: 4px;
    font-size: 11px;
  }

  .apply-link {
    color: var(--accent);
    text-decoration: none;
    font-size: 12px;
    border: 1px solid rgba(91,127,255,0.4);
    border-radius: 4px;
    padding: 3px 8px;
    display: inline-block;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .apply-link:hover { background: rgba(91,127,255,0.15); }

  .expand-icon {
    color: var(--muted);
    font-size: 12px;
    display: inline-block;
    transition: transform 0.2s;
  }

  /* Detail row */
  .detail-row { display: none; }
  .detail-row.visible { display: table-row; }

  .detail-cell {
    padding: 0 12px 16px 12px;
    background: var(--surface);
    border-bottom: 2px solid var(--accent2);
  }
  .detail-inner {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    padding-top: 16px;
  }
  .detail-block h4 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 600;
  }

  .dim-table { width: 100%; border-collapse: collapse; }
  .dim-table td {
    padding: 5px 8px;
    font-size: 12px;
    border-bottom: 1px solid var(--border);
  }
  .dim-table tr:last-child td { border-bottom: none; }
  .dim-table td:first-child  { color: var(--muted); width: 52%; }
  .dim-table td:nth-child(2) { font-weight: 700; text-align: center; width: 13%; }
  .dim-table td:last-child   { color: var(--muted); font-size: 11px; }

  .dim-5 { color: var(--grade-a); }
  .dim-4 { color: #7ecbff; }
  .dim-3 { color: var(--text); }
  .dim-2 { color: var(--stale); }
  .dim-1 { color: var(--grade-d); }

  .raw-score {
    margin-top: 10px;
    padding: 8px 10px;
    background: var(--surface2);
    border-radius: 6px;
    font-size: 12px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }
  .raw-score span   { color: var(--muted); }
  .raw-score strong { color: var(--text); }
  .cap-explain { color: var(--flag); }

  .notes-text {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    background: var(--surface2);
    border-radius: 6px;
    padding: 10px;
  }

  .prescreen {
    margin-bottom: 10px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .prescreen-item {
    font-size: 12px;
    display: flex;
    align-items: flex-start;
    gap: 7px;
  }
  .ps-icon { width: 16px; flex-shrink: 0; margin-top: 1px; }
  .ps-pass { color: var(--grade-a); }
  .ps-warn { color: var(--flag); }

  .addendum-note {
    background: rgba(245,166,35,0.08);
    border: 1px solid rgba(245,166,35,0.25);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 12px;
    color: var(--stale);
    margin-top: 10px;
  }

  /* Observation / Key insight */
  .observation-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.75;
    margin-bottom: 24px;
  }
  .observation-box strong { color: var(--text); }

  .no-results {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-size: 13px;
  }

  /* ── Rejected panel ─────────────────────────────── */
  .rej-panel {
    margin-top: 32px;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .rej-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    background: var(--surface);
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid transparent;
    transition: background 0.15s, border-color 0.15s;
  }
  .rej-header:hover { background: var(--surface2); }
  .rej-header.open  { border-bottom-color: var(--border); }

  .rej-header-label {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .rej-counts {
    margin-left: 4px;
    display: flex;
    gap: 6px;
  }
  .tier1-pill {
    background: rgba(245,166,35,0.12);
    border: 1px solid rgba(245,166,35,0.3);
    border-radius: 10px;
    padding: 2px 8px;
    font-size: 11px;
    color: var(--tier1);
    font-weight: 600;
    text-transform: none;
    letter-spacing: 0;
  }
  .tier2-pill {
    background: rgba(136,146,176,0.1);
    border: 1px solid rgba(136,146,176,0.2);
    border-radius: 10px;
    padding: 2px 8px;
    font-size: 11px;
    color: var(--tier2);
    text-transform: none;
    letter-spacing: 0;
  }

  .rej-toggle-icon {
    color: var(--muted);
    font-size: 11px;
    margin-left: auto;
    transition: transform 0.2s;
  }

  /* Rejected sub-filter bar */
  .rej-filter-bar {
    display: none;
    gap: 28px;
    padding: 9px 16px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    align-items: center;
  }
  .rej-filter-bar.visible { display: flex; }

  /* Reason category badge */
  .reason-cat {
    display: inline-block;
    border-radius: 4px;
    padding: 2px 7px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  .rcat-salary_floor  { background: rgba(245,166,35,0.12); color: var(--grade-c); border: 1px solid rgba(245,166,35,0.25); }
  .rcat-clearance     { background: rgba(224,82,82,0.12);  color: var(--grade-d); border: 1px solid rgba(224,82,82,0.25); }
  .rcat-geo_restriction { background: rgba(91,127,255,0.12); color: #8fa8ff; border: 1px solid rgba(91,127,255,0.25); }
  .rcat-travel        { background: rgba(91,127,255,0.12); color: #8fa8ff; border: 1px solid rgba(91,127,255,0.25); }
  .rcat-domain_exclusion { background: rgba(136,146,176,0.1); color: var(--muted); border: 1px solid rgba(136,146,176,0.2); }
  .rcat-title_level   { background: rgba(136,146,176,0.1); color: var(--muted); border: 1px solid rgba(136,146,176,0.2); }
  .rcat-non_pm        { background: rgba(136,146,176,0.1); color: var(--muted); border: 1px solid rgba(136,146,176,0.2); }
  .rcat-prescreen     { background: rgba(136,146,176,0.1); color: var(--muted); border: 1px solid rgba(136,146,176,0.2); }
  .rcat-grade_d       { background: rgba(224,82,82,0.08);  color: var(--grade-d); border: 1px solid rgba(224,82,82,0.2); }
  .rcat-other         { background: rgba(136,146,176,0.1); color: var(--muted); border: 1px solid rgba(136,146,176,0.2); }

  /* Rejected detail cell */
  .rej-detail-cell {
    padding: 12px 16px 16px;
    background: var(--surface);
    border-bottom: 2px solid rgba(136,146,176,0.3);
  }
  .rej-reason-full {
    font-size: 12px;
    color: var(--text);
    background: var(--surface2);
    border-radius: 6px;
    padding: 10px 12px;
    line-height: 1.6;
    margin-bottom: 8px;
  }
  .rej-notes {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }

  @media (max-width: 900px) {
    .detail-inner  { grid-template-columns: 1fr; }
    .section       { padding: 0 16px 24px; }
    header         { padding: 16px; }
    .stats-bar     { padding: 12px 16px; }
    .search-url    { margin: 12px 16px 0; }
    .filter-bar    { padding: 10px 16px; gap: 16px; }
  }
</style>
</head>
<body>

<!-- ── Drop zone ─────────────────────────────────────── -->
<div id="dropzone">
  <h1>Jobsift</h1>
  <!-- progress panel (shown during a scrape) -->
  <div id="progress-panel" style="display:none;width:100%;max-width:620px;margin:0 auto 24px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px 24px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span id="progress-msg" style="font-size:14px;font-weight:600">Starting...</span>
      <span id="progress-pct" style="font-size:13px;color:var(--muted)">0%</span>
    </div>
    <div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden">
      <div id="progress-bar" style="height:100%;background:var(--accent);width:0%;transition:width .3s"></div>
    </div>
    <!-- live activity feed so the run is not a black box -->

<script>
// ═══════════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════════
const DIM_LABELS = [

  'D5 - Seniority / Comp',

const DIM_KEYS  = ['d1','d2','d3','d4','d5','d6'];
const GRADE_ORDER = { 'A': 1, 'B': 2, 'C': 3, 'D': 4 };

const REJ_CAT_ORDER = [
  'salary_floor','clearance','geo_restriction','travel',
  'domain_exclusion','title_level','non_pm','prescreen','grade_d','other'
];
const REJ_CAT_LABELS = {
  salary_floor:     'Salary Below Floor',
  clearance:        'Clearance / Competitor',
  geo_restriction:  'Geographic Restriction',
  travel:           'Travel Requirement',
  domain_exclusion: 'Domain / Expertise',
  title_level:      'Title Level Mismatch',
  non_pm:           'Non-PM Title',
  prescreen:        'Pre-Screen Failure',
  grade_d:          'Grade D',
  other:            'Other',
};

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let allRoles    = [];
let filteredRoles = [];
let allRejRoles = [];
let rejRendered = false;
let rejOpen     = false;
let sourceTab   = 'jobright';

const isAtsRole = r => !!(r.id && r.id.startsWith('ats_'));

const sectionState = {
  remote:   { tab: 'pm', sortCol: 'grade', sortDir: 'asc' },
  hybrid:   { tab: 'pm', sortCol: 'grade', sortDir: 'asc' },
  inperson: { tab: 'pm', sortCol: 'grade', sortDir: 'asc' },
};
const rejState = { tab: 'pm', sortCol: 'category', sortDir: 'asc', tier: 'tier1' };

// ═══════════════════════════════════════════════════════════════
// ELECTRON BOOT
// ═══════════════════════════════════════════════════════════════
const fileInput  = document.getElementById('file-input');
const errorMsg   = document.getElementById('error-msg');

// Reflect Jobright auth state in both status badges and the Sign In button.
function updateAuthBadge(loggedIn) {
  const text  = loggedIn ? '✓ Jobright session authenticated' : '⚠ Not signed in to Jobright';
  const color = loggedIn ? '#4caf7d' : 'var(--muted)';
  const home = document.getElementById('auth-status');
  if (home) {
    home.textContent = text;
    home.style.color = color;
    home.style.borderColor = loggedIn ? '#4caf7d' : 'var(--border)';
  }
  const hdr = document.getElementById('auth-status-header');
  if (hdr) { hdr.textContent = text; hdr.style.color = color; }
  const btn = document.getElementById('signin-btn');
  if (btn) btn.style.display = loggedIn ? 'none' : '';
}

// Re-check the session and refresh the badge.
function refreshAuthBadge() {
  if (!window.electronAPI?.isLoggedIn) return;
  window.electronAPI.isLoggedIn().then(updateAuthBadge).catch(() => {});
}

function setSignedIn() {
  document.getElementById('empty-heading').textContent = 'Ready to run.';
  document.getElementById('empty-subtext').textContent = 'Click Run Now to start a search.';
  updateAuthBadge(true);
  // Clear any stale "not signed in" prompt now that the session is valid.
  if (errorMsg) errorMsg.style.display = 'none';
}

// Shown when Run Now is pressed without a Jobright session. Friendly prompt
// rather than a red failure; the sign-in window is opened by the main process.
function showAuthNeeded() {
  document.getElementById('dashboard').style.display     = 'none';
  document.getElementById('dropzone').style.display      = 'flex';
  document.getElementById('progress-panel').style.display = 'none';
  document.getElementById('empty-state').style.display   = 'block';
  document.getElementById('empty-heading').textContent   = 'Sign in to Jobright to continue';
  document.getElementById('empty-subtext').textContent   = 'A sign-in window has opened. After you sign in, press Run Now.';
  updateAuthBadge(false);
  if (errorMsg) errorMsg.style.display = 'none';
}

// Load latest result on startup
if (window.electronAPI) {
  // Check auth state immediately so the empty state reflects the persisted session.
  window.electronAPI.isLoggedIn().then(loggedIn => {
    updateAuthBadge(loggedIn);
    if (loggedIn) setSignedIn();
  }).catch(() => {});

  // Stay on the home/landing screen at launch instead of auto-loading the last
  // run. The user can open a previous run via "Load Past Result", and a fresh
  // run renders automatically on completion.

  // Restore the persisted scan period into the selectors.
  window.electronAPI.getRunPeriod?.().then(days => {
    if (days) setRunPeriod(days, /*persist=*/false);
  }).catch(() => {});

  // Scrape progress events — store cleanup fns to prevent listener accumulation on reload
  const _cleanupProgress = window.electronAPI.onScrapeProgress(({ step, message, pct }) => {
    // progress-panel lives inside #dropzone, so we must ensure dropzone is visible
    // regardless of whether the dashboard is currently showing (re-scrape case).
    document.getElementById('dashboard').style.display    = 'none';
    document.getElementById('dropzone').style.display     = 'flex';
    document.getElementById('empty-state').style.display  = 'none';
    document.getElementById('progress-panel').style.display = 'block';
    document.getElementById('progress-msg').textContent   = message;
    document.getElementById('progress-pct').textContent   = Math.round(pct) + '%';
    document.getElementById('progress-bar').style.width   = Math.round(pct) + '%';
    // First step of a run (auth check): clear any stale feed and reset Cancel,
    // so tray-initiated runs also start fresh.
    if (step === 'auth') {
      const log = document.getElementById('progress-log');
      if (log) log.innerHTML = '';
      const btn = document.getElementById('cancel-btn');
      if (btn) { btn.textContent = 'Cancel'; btn.disabled = false; btn.style.opacity = '1'; }
      if (errorMsg) errorMsg.style.display = 'none';
    }
    appendProgressLog(message);
  });

  const _cleanupComplete = window.electronAPI.onScrapeComplete(({ outputPath, counts }) => {
    document.getElementById('progress-panel').style.display = 'none';
    // A run that reviewed nothing (everything was a duplicate of prior runs, or
    // nothing matched) should explain itself instead of showing a blank board.
    if (counts && (counts.accepted | 0) === 0 && (counts.rejected | 0) === 0) {
      resetToDropzone();
      document.getElementById('empty-heading').textContent = 'No new listings to review';
      document.getElementById('empty-subtext').textContent =
        'Everything found was already seen in a previous run (deduplicated), or nothing matched. ' +
        'Check the activity feed counts, try a longer period, or open a previous run with Load Past Result.';
      return;
    }
    window.electronAPI.getLatestResult().then(data => { if (data) render(data); });
  });

  const _cleanupError = window.electronAPI.onScrapeError(({ message }) => {
    document.getElementById('progress-panel').style.display = 'none';
    document.getElementById('empty-state').style.display    = 'block';
    showError('Scrape failed: ' + message);
  });

  const _cleanupCancelled = window.electronAPI.onScrapeCancelled?.(() => {
    // Leave the progress view instead of hanging on the last message.
    resetToDropzone();
    document.getElementById('empty-heading').textContent = 'Run cancelled';
    document.getElementById('empty-subtext').textContent = 'The scan was stopped. Press Run Now to start again.';
  });

  const _cleanupLogin = window.electronAPI.onLoginComplete(() => setSignedIn());
  const _cleanupAuthReq = window.electronAPI.onAuthRequired?.(() => showAuthNeeded());

  // Remove listeners before page reloads so they don't stack
  window.addEventListener('beforeunload', () => {
    _cleanupProgress?.();
    _cleanupComplete?.();
    _cleanupError?.();
    _cleanupCancelled?.();
    _cleanupLogin?.();
    _cleanupAuthReq?.();
  });
}

// File input still works as a fallback (load any result JSON manually)
fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try   { render(JSON.parse(ev.target.result)); }
    catch (err) { showError('Invalid JSON: ' + err.message); }
  };
  reader.readAsText(file);
});

// Scan period in days, mirroring the CLI (24h / 3d / 1 week / 1 month).
let _runPeriod = 7;
function setRunPeriod(v, persist = true) {
  _runPeriod = parseInt(v, 10) || 7;
  // Keep the empty-state and header selectors in sync.
  document.querySelectorAll('.run-period').forEach(s => { s.value = String(_runPeriod); });
  // Persist the choice so it survives restarts and is used by the tray Run Now.
  if (persist) window.electronAPI?.setRunPeriod?.(_runPeriod);
}

function openConfig() {
  // Navigate this same window to the Configuration page (no second window).
  window.location.href = '../config/index.html';
}

// When checked, the run skips cross-run de-duplication and shows its full set.
let _includeSeen = false;
function setIncludeSeen(v) {
  _includeSeen = !!v;
  document.querySelectorAll('.include-seen').forEach(c => { c.checked = _includeSeen; });
}

// Append a line to the live activity feed, skipping consecutive duplicates and
// keeping the list to a sane length.
function appendProgressLog(message) {
  const log = document.getElementById('progress-log');
  if (!log || !message) return;
  const last = log.lastChild;
  // Collapse repetitive "n/total" progress: if the new line has the same text
  // before the ratio as the previous line, update that line in place instead of
  // printing a new one for every page.
  const RATIO = /^(.*?)(\d+)\s*\/\s*(\d+)\s*$/;
  const m = message.match(RATIO);
  if (m && last) {
    const lm = (last.textContent || '').match(RATIO);
    if (lm && lm[1] === m[1]) { last.textContent = message; log.scrollTop = log.scrollHeight; return; }
  }
  if (last && last.textContent === message) return;  // skip consecutive duplicates
  const line = document.createElement('div');
  line.textContent = message;
  log.appendChild(line);
  while (log.childElementCount > 100) log.removeChild(log.firstChild);
  log.scrollTop = log.scrollHeight;
}

// Cancel wrapper: signal the main process and reflect "stopping" in the UI so the
// user knows the request was received (cancellation finishes the current item).
function cancelScrape() {
  if (!window.electronAPI) return;
  window.electronAPI.cancelScrape();
  const btn = document.getElementById('cancel-btn');
  if (btn) { btn.textContent = 'Cancelling…'; btn.disabled = true; btn.style.opacity = '0.6'; }
  appendProgressLog('Cancelling… finishing the current request.');
}

function runNow() {
  if (!window.electronAPI) { showError('Electron API not available.'); return; }
  // Clear any stale message (e.g. "No past results found.") and reset the feed.
  if (errorMsg) errorMsg.style.display = 'none';
  const log = document.getElementById('progress-log');
  if (log) log.innerHTML = '';
  const btn = document.getElementById('cancel-btn');
  if (btn) { btn.textContent = 'Cancel'; btn.disabled = false; btn.style.opacity = '1'; }
  window.electronAPI.startScrape({ daysAgo: _runPeriod, includeSeen: _includeSeen });
}

async function loadPastResult() {
  if (!window.electronAPI) {
    fileInput.click();
    return;
  }
  const paths = await window.electronAPI.listResults();
  if (!paths.length) { showError('No past results found.'); return; }
  openResultPicker(paths);
}

// Turn job-search-YYYY-MM-DD_HH-MM.json into a readable label.
function _prettyRunLabel(p) {
  const base = p.split(/[/\\]/).pop();
  const m = /(\d{4})-(\d{2})-(\d{2})_(\d{2})-(\d{2})/.exec(base);
  return m ? `${m[1]}-${m[2]}-${m[3]}  ${m[4]}:${m[5]}` : base;
}

function closeResultPicker() {
  const el = document.getElementById('result-picker');
  if (el) el.remove();
}

function openResultPicker(paths) {
  closeResultPicker();
  const overlay = document.createElement('div');
  overlay.id = 'result-picker';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:1000';
  overlay.addEventListener('click', e => { if (e.target === overlay) closeResultPicker(); });

  const panel = document.createElement('div');
  panel.style.cssText = 'background:var(--surface);border:1px solid var(--border);border-radius:10px;max-width:440px;width:90%;max-height:70vh;overflow:auto;padding:18px 20px';
  let html = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'
           + '<strong style="font-size:15px">Load a past run</strong>'
           + '<button onclick="closeResultPicker()" style="background:none;border:none;color:var(--muted);font-size:20px;line-height:1;cursor:pointer">&times;</button></div>'
           + '<div style="display:flex;flex-direction:column;gap:6px">';
  paths.forEach((p, i) => {
    const label = _prettyRunLabel(p) + (i === 0 ? '  (latest)' : '');
    html += `<button class="picker-row" data-idx="${i}" style="text-align:left;background:var(--surface2);color:var(--text);border:1px solid var(--border);padding:9px 12px;border-radius:6px;font-size:13px;cursor:pointer">${label}</button>`;
  });
  html += '</div>';
  panel.innerHTML = html;
  overlay.appendChild(panel);
  document.body.appendChild(overlay);

  panel.querySelectorAll('.picker-row').forEach(btn => {
    btn.addEventListener('mouseenter', () => { btn.style.borderColor = 'var(--accent)'; });
    btn.addEventListener('mouseleave', () => { btn.style.borderColor = 'var(--border)'; });
    btn.addEventListener('click', async () => {
      const p = paths[parseInt(btn.getAttribute('data-idx'), 10)];
      try {
        const data = await window.electronAPI.loadResult(p);
        closeResultPicker();
        render(data);
      } catch (err) { showError('Failed to load: ' + err.message); }
    });
  });
}

function showError(msg) {
  errorMsg.textContent   = msg;
  errorMsg.style.display = 'block';
}

function resetToDropzone() {
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('dropzone').style.display  = 'flex';
  // A prior scrape hides the empty-state and shows the progress panel; restore
  // them so the landing controls (Run Now, Sign In, Configuration, etc.) reappear
  // instead of leaving a blank page with only the title.
  document.getElementById('progress-panel').style.display = 'none';
  document.getElementById('empty-state').style.display    = 'block';
  refreshAuthBadge();
  fileInput.value = '';
  errorMsg.style.display = 'none';
  // Reset rejected panel state
  rejOpen = false; rejRendered = false;
  sourceTab = 'jobright';
  document.getElementById('src-jobright').classList.add('active');
  document.getElementById('src-ats').classList.remove('active');
  document.getElementById('rej-content').style.display   = 'none';
  document.getElementById('rej-filter-bar').classList.remove('visible');
  document.getElementById('rej-header').classList.remove('open');
  document.getElementById('rej-toggle-icon').style.transform = '';
  document.getElementById('rej-tab-pm').classList.add('active');
  document.getElementById('rej-tab-pjm').classList.remove('active');
  document.getElementById('tier-t1').checked = true;
}

// ═══════════════════════════════════════════════════════════════
// RENDER - main entry point
// ═══════════════════════════════════════════════════════════════
function render(data) {
  // Support both combined format {accepted:{...}, rejected:{...}}
  // and legacy single-section format {meta:{...}, roles:[...]}
  const isLegacy = !data.accepted;
  const accData  = isLegacy ? data         : data.accepted;
  const rejData  = isLegacy ? null         : data.rejected;

  const meta   = accData.meta  || {};
  allRoles     = accData.roles || [];
  allRejRoles  = rejData ? (rejData.roles || []) : [];

  // Section header labels - driven by track_locations from the JSON meta
  const _irlLoc = (meta.track_locations || {}).IRL;
  const _locSuffix = _irlLoc ? ` ${_irlLoc}` : '';
  document.getElementById('label-hybrid').textContent   = `🔀 Hybrid${_locSuffix}`;
  document.getElementById('label-inperson').textContent = `📍 In-Person${_locSuffix}`;

  // Source tab counts
  document.getElementById('src-jobright-count').textContent = allRoles.filter(r => !isAtsRole(r)).length;
  document.getElementById('src-ats-count').textContent      = allRoles.filter(r =>  isAtsRole(r)).length;

  // Header meta
  document.getElementById('header-meta').innerHTML = [
    meta.date             ? `<span>📅 ${meta.date}</span>` : '',
    meta.search_term      ? `<span>🔍 ${meta.search_term}</span>` : '',
    meta.locations        ? `<span>🌐 ${meta.locations}</span>` : '',
    meta.qualifying_count != null ? `<span>📊 ${meta.qualifying_count} qualifying roles</span>` : '',
  ].filter(Boolean).join('');


  // Stats bar
  const TRACK_CHIP_COLORS = ['#7de8b8', '#f5c46a', '#8fa8ff', '#ff9e7a', '#c4b5fd'];
  const trackCountChips = Object.entries(meta.track_counts || {}).map(([key, count], i) => {
    const label = (meta.track_labels || {})[key] || key;
    return chip(label, count, TRACK_CHIP_COLORS[i % TRACK_CHIP_COLORS.length]);
  });
  const chips = [
    meta.reviewed_count   != null ? chip('Reviewed',    `${meta.reviewed_count} / ${meta.total_results || '?'}`) : '',
    meta.qualifying_count != null ? chip('Qualifying',  meta.qualifying_count) : '',
    meta.grade_a          != null ? chip('Grade A',     meta.grade_a,  'var(--grade-a)') : '',
    meta.grade_b          != null ? chip('Grade B',     meta.grade_b,  'var(--grade-b)') : '',
    meta.grade_c          != null ? chip('Grade C',     meta.grade_c,  'var(--grade-c)') : '',
    meta.excluded_count   != null ? chip('Excluded',    meta.excluded_count) : '',
    ...trackCountChips,
  ].filter(Boolean).join('');
  document.getElementById('stats-bar').innerHTML = chips;

  // Key observation
  if (meta.key_observation) {
    document.getElementById('observation-box').innerHTML =
      `<strong>Key observation:</strong> ${esc(meta.key_observation)}`;
  }

  // Rejected panel header counts
  if (allRejRoles.length) {
    const t1 = allRejRoles.filter(r => r.rejection_tier === 'tier1').length;
    const t2 = allRejRoles.filter(r => r.rejection_tier === 'tier2').length;
    document.getElementById('rej-t1-pill').textContent  = `${t1} near-miss`;
    document.getElementById('rej-t2-pill').textContent  = `+${t2} noise`;
    document.getElementById('rej-panel').style.display = 'block';
  } else {
    document.getElementById('rej-panel').style.display = 'none';
  }

  // Build dynamic track filter checkboxes from meta.track_labels
  const trackLabels = meta.track_labels || {};
  const trackKeys   = Object.keys(trackLabels).length ? Object.keys(trackLabels)
                    : [...new Set((accData.roles || []).map(r => r.track).filter(Boolean))];
  const trackGroup  = document.getElementById('track-filter-group');
  // Preserve current checked state for keys that were already present
  const prevTrackState = {};
  trackGroup.querySelectorAll('input[type=checkbox]').forEach(cb => {
    prevTrackState[cb.dataset.track] = cb.checked;
  });
  trackGroup.innerHTML = '<span>Track</span>';
  trackKeys.forEach(key => {
    const label  = trackLabels[key] || key;
    const checked = prevTrackState[key] !== undefined ? prevTrackState[key] : true;
    const lbl = document.createElement('label');
    lbl.innerHTML = `<input type="checkbox" data-track="${key}"${checked ? ' checked' : ''} onchange="onFilterChange()"> ${esc(label)} <small style="color:var(--muted);font-size:10px">(${key})</small>`;
    trackGroup.appendChild(lbl);
  });

  // Build dynamic role-type filter from unique role_cat values in loaded roles
  const allCats   = [...new Set((accData.roles || []).map(r => r.role_cat || 'Other'))].sort();
  const typeGroup = document.getElementById('type-filter-group');
  const prevTypeState = {};
  typeGroup.querySelectorAll('input[type=checkbox]').forEach(cb => {
    prevTypeState[cb.dataset.cat] = cb.checked;
  });
  typeGroup.innerHTML = '<span>Type</span>';
  allCats.forEach(cat => {
    const checked = prevTypeState[cat] !== undefined ? prevTypeState[cat] : true;
    const lbl = document.createElement('label');
    lbl.innerHTML = `<input type="checkbox" data-cat="${cat}"${checked ? ' checked' : ''} onchange="onFilterChange()"> ${esc(cat)}`;
    typeGroup.appendChild(lbl);
  });

  applyTrackFilter();

  // If nothing was accepted but roles were reviewed and rejected, auto-expand the
  // rejected panel so the run is not a blank-looking screen.
  if ((accData.roles || []).length === 0 && allRejRoles.length > 0 && !rejOpen) {
    toggleRejPanel();
  }

  document.getElementById('dropzone').style.display  = 'none';
  document.getElementById('dashboard').style.display = 'block';
}

// ═══════════════════════════════════════════════════════════════
// ACCEPTED: FILTER + SECTIONS
// ═══════════════════════════════════════════════════════════════
function onFilterChange() {
  applyTrackFilter();
  if (rejOpen && rejRendered) renderRejectedSection();
}

function handleSourceTab(tab) {
  sourceTab = tab;
  document.getElementById('src-jobright').classList.toggle('active', tab === 'jobright');
  document.getElementById('src-ats').classList.toggle('active',      tab === 'ats');
  applyTrackFilter();
  if (rejOpen) { rejRendered = false; renderRejectedSection(); rejRendered = true; }
}

function applyTrackFilter() {
  const activeTracks = new Set(
    [...document.querySelectorAll('#track-filter-group input[type=checkbox]')]
      .filter(cb => cb.checked).map(cb => cb.dataset.track)
  );
  const activeTypes = new Set(
    [...document.querySelectorAll('#type-filter-group input[type=checkbox]')]
      .filter(cb => cb.checked).map(cb => cb.dataset.cat)
  );
  // If filters haven't been built yet (no data loaded), show everything
  const noTrackFilter = activeTracks.size === 0;
  const noTypeFilter  = activeTypes.size  === 0;
  filteredRoles = allRoles.filter(r =>
    (noTrackFilter || activeTracks.has(r.track)) &&
    (noTypeFilter  || activeTypes.has(r.role_cat || 'Other')) &&
    (sourceTab === 'ats' ? isAtsRole(r) : !isAtsRole(r))
  );
  renderAllSections();
}

function resetFilters() {
  document.querySelectorAll('#track-filter-group input[type=checkbox]').forEach(cb => { cb.checked = true; });
  document.querySelectorAll('#type-filter-group input[type=checkbox]').forEach(cb => { cb.checked = true; });
  onFilterChange();
}

function renderAllSections() {
  renderSection('remote',   'remote');
  renderSection('hybrid',   'hybrid');
  renderSection('inperson', 'in-person');
}

function renderSection(sectionId, bucket) {
  const ss           = sectionState[sectionId];
  const sectionRoles = filteredRoles.filter(r => r.work_type_bucket === bucket);
  const pmRoles      = sectionRoles.filter(r => r.role_cat !== 'PjM');
  const pjmRoles     = sectionRoles.filter(r => r.role_cat === 'PjM');
  const activeRoles  = ss.tab === 'pm' ? pmRoles : pjmRoles;
  const sorted       = sortRoles(activeRoles, ss.sortCol, ss.sortDir);

  const countEl = document.getElementById(sectionId + '-count');
  if (countEl) countEl.textContent = `${sectionRoles.length} total`;

  const container = document.getElementById(sectionId + '-section');
  if (!container) return;
  container.innerHTML = buildTabBar(sectionId, pmRoles.length, pjmRoles.length) +
                        buildTableHtml(sorted, sectionId);
}

function buildTabBar(sectionId, pmCount, pjmCount) {
  const ss = sectionState[sectionId];
  const pmActive  = ss.tab === 'pm'  ? 'active' : '';
  const pjmActive = ss.tab === 'pjm' ? 'active' : '';
  return `<div class="tab-bar">
    <button class="tab-btn ${pmActive}"  onclick="handleTab('${sectionId}','pm')">
      TPM &amp; PM <span class="tab-count">${pmCount}</span>
    </button>
    <button class="tab-btn ${pjmActive}" onclick="handleTab('${sectionId}','pjm')">
      Project Manager <span class="tab-count">${pjmCount}</span>
    </button>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
// ACCEPTED: TABLE BUILDER
// ═══════════════════════════════════════════════════════════════
const COLS = [
  { key: 'expand',  label: '',        sortable: false, style: 'width:24px' },
  { key: 'company', label: 'Company', sortable: true },
  { key: 'title',   label: 'Role',    sortable: true },
  { key: 'track',   label: 'Track',   sortable: false },
  { key: 'type',    label: 'Type',    sortable: false },
  { key: 'posted',  label: 'Posted',  sortable: true },
  { key: 'salary',  label: 'Salary',  sortable: false },
  { key: 'grade',   label: 'Grade',   sortable: true },
  { key: 'apply',   label: 'Apply',   sortable: false },
];

function buildTableHtml(roles, sectionId) {
  const ss      = sectionState[sectionId];
  const colspan = COLS.length;
  const theadCells = COLS.map(col => {
    if (!col.sortable) return `<th${col.style ? ` style="${col.style}"` : ''}>${col.label}</th>`;
    const isActive = ss.sortCol === col.key;
    const icon = isActive ? (ss.sortDir === 'asc' ? '↑' : '↓') : '↕';
    return `<th class="sortable${isActive ? ' sort-active' : ''}" onclick="handleSort('${sectionId}','${col.key}')">
      ${col.label}<span class="sort-icon">${icon}</span>
    </th>`;
  }).join('');
  const rows = roles.length
    ? roles.map(r => roleRowPair(r, colspan)).join('')
    : `<tr><td colspan="${colspan}"><div class="no-results">No roles found.</div></td></tr>`;
  return `<div class="table-scroll"><table><thead><tr>${theadCells}</tr></thead><tbody>${rows}</tbody></table></div>`;
}

// ═══════════════════════════════════════════════════════════════
// ACCEPTED: ROW PAIR (main + expandable detail)
// ═══════════════════════════════════════════════════════════════
function roleRowPair(r, colspan) {
  const id   = r.id || Math.random().toString(36).slice(2);
  const dims = r.dimensions || {};
  const pre  = r.prescreen  || {};

  const typeMap = {
    'remote':    { label: 'Remote',    cls: 'type-remote' },
    'hybrid':    { label: 'Hybrid',    cls: 'type-hybrid' },
    'in-person': { label: 'In-Person', cls: 'type-inperson' },
  };
  const wt = typeMap[r.work_type_bucket] || { label: r.work_type_bucket || '-', cls: '' };

  const capped    = r.fit && r.grade && r.fit !== r.grade;
  const capArrow  = capped ? `<span class="cap-arrow" title="Capped from ${r.fit}">↓</span>` : '';
  const gradeBadge = `<span class="badge grade-${r.grade}">${r.grade}${capArrow}</span>`;

  const ageTier   = r.age_tier || 'Unknown';
  const postedHtml = `<span class="posted-${ageTier}">${esc(r.posted || 'Unknown')}</span>`;
  const trackBadge = r.track ? `<span class="badge track-${r.track}">${r.track}</span>` : '-';

  const mainRow = `
    <tr class="job-row" onclick="toggle('${id}')">
      <td><span class="expand-icon" id="icon-${id}">▶</span></td>
      <td>
        <div class="company-name">${esc(r.company)}</div>
        <div class="location-text">${esc(r.location || '')}</div>
      </td>
      <td><div class="role-title">${esc(r.role_title)}</div></td>
      <td>${trackBadge}</td>
      <td><span class="badge ${wt.cls}">${wt.label}</span></td>
      <td>${postedHtml}</td>
      <td><span class="salary${r.salary_unknown ? ' unknown' : ''}">${esc(r.salary || 'Not listed')}</span></td>
      <td>${gradeBadge}</td>
      <td>${r.apply_url
        ? `<a class="apply-link" href="${r.apply_url}" target="_blank" onclick="event.stopPropagation()">Apply →</a>`
        : '<span style="color:var(--muted);font-size:12px">-</span>'}
      </td>
    </tr>`;

  const dimRows = DIM_KEYS.map((key, i) => {
    const d = dims[key] || {};
    const score = d.score != null ? d.score : '-';
    return `<tr><td>${DIM_LABELS[i]}</td><td class="dim-${score}">${score}</td><td>${esc(d.rationale || '')}</td></tr>`;
  }).join('');

  const fitPart = capped
    ? `<span>Fit: <strong class="cap-explain">${r.fit} → capped to ${r.grade}</strong></span>
       <span class="cap-explain">⚠ ${r.age_tier || ''} posting</span>`
    : '';
  const capNoteParts = [
    r.d6_cap  ? `D6 cap applied: <strong>${r.d6_cap}</strong>` : '',
    r.age_cap ? `Age cap: <strong>${r.age_cap}</strong>` : '',
  ].filter(Boolean);

  const rawScore = `<div class="raw-score">
    <span>Score: <strong>${r.weighted_score != null ? r.weighted_score : '-'} / 25</strong></span>
    <span>Grade: <strong>${r.grade}</strong></span>
    ${fitPart}
    ${capNoteParts.map(s => `<span>${s}</span>`).join('')}
    ${r.age_tier ? `<span>Age: <strong class="posted-${r.age_tier}">${r.age_tier}</strong></span>` : ''}
  </div>`;

  const prescreenHtml = Object.entries(pre).map(([, q]) => {
    const cls  = q.pass ? 'ps-pass' : 'ps-warn';
    const icon = q.pass ? '✓' : '⚠';
    return `<div class="prescreen-item"><span class="ps-icon ${cls}">${icon}</span><span>${esc(q.note || '')}</span></div>`;
  }).join('');

  const flagsHtml = (r.flags || []).map(f =>
    `<div style="color:var(--flag);font-size:12px;margin-top:4px">⚠ ${esc(f)}</div>`
  ).join('');

  const addendumHtml = r.addendum_note
    ? `<div class="addendum-note">⚠ ADDENDUM: ${esc(r.addendum_note)}</div>` : '';

  const detailRow = `
    <tr class="detail-row" id="detail-${id}">
      <td colspan="${colspan}" class="detail-cell">
        <div class="detail-inner">
          <div class="detail-block">
            <h4>Dimension Scores</h4>
            <table class="dim-table">${dimRows}</table>
            ${rawScore}
          </div>
          <div class="detail-block">
            <h4>Pre-Screen &amp; Notes</h4>
            ${prescreenHtml ? `<div class="prescreen">${prescreenHtml}</div>` : ''}
            <div class="notes-text">${esc(r.notes || '-')}</div>
            ${flagsHtml}
            ${addendumHtml}
          </div>
        </div>
      </td>
    </tr>`;

  return mainRow + detailRow;
}

// ═══════════════════════════════════════════════════════════════
// REJECTED PANEL
// ═══════════════════════════════════════════════════════════════
function toggleRejPanel() {
  rejOpen = !rejOpen;
  const content  = document.getElementById('rej-content');
  const filterBar = document.getElementById('rej-filter-bar');
  const icon      = document.getElementById('rej-toggle-icon');
  const header    = document.getElementById('rej-header');

  if (rejOpen) {
    content.style.display = 'block';
    filterBar.classList.add('visible');
    icon.style.transform = 'rotate(90deg)';
    header.classList.add('open');
    // Show noise pill now that panel is open
    document.getElementById('rej-t2-pill').style.display = '';
    if (!rejRendered) {
      renderRejectedSection();
      rejRendered = true;
    }
  } else {
    content.style.display = 'none';
    filterBar.classList.remove('visible');
    icon.style.transform = '';
    header.classList.remove('open');
    document.getElementById('rej-t2-pill').style.display = 'none';
  }
}

function onRejFilterChange() {
  rejState.tier = document.querySelector('input[name="tier"]:checked').value;
  renderRejectedSection();
}

function handleRejTab(tab) {
  rejState.tab = tab;
  document.getElementById('rej-tab-pm').classList.toggle('active',  tab === 'pm');
  document.getElementById('rej-tab-pjm').classList.toggle('active', tab === 'pjm');
  renderRejectedSection();
}

function getFilteredRejRoles() {
  // Use the same track checkboxes as the accepted side (built with data-track),
  // not non-existent "filt-XXX" element ids. If none are checked, show all tracks.
  const activeTracks = new Set(
    [...document.querySelectorAll('#track-filter-group input[type=checkbox]')]
      .filter(cb => cb.checked).map(cb => cb.dataset.track)
  );
  const noTrackFilter = activeTracks.size === 0;
  let roles = allRejRoles.filter(r =>
    (noTrackFilter || activeTracks.has(r.track)) &&
    (sourceTab === 'ats' ? isAtsRole(r) : !isAtsRole(r))
  );
  if (rejState.tier !== 'all') {
    roles = roles.filter(r => r.rejection_tier === rejState.tier);
  }
  return roles;
}

function renderRejectedSection() {
  const allFiltered = getFilteredRejRoles();
  const pmRoles     = allFiltered.filter(r => r.role_cat !== 'PjM');
  const pjmRoles    = allFiltered.filter(r => r.role_cat === 'PjM');
  const activeRoles = rejState.tab === 'pm' ? pmRoles : pjmRoles;
  const sorted      = sortRejRoles(activeRoles);

  // Update tab counts
  document.getElementById('rej-pm-count').textContent  = pmRoles.length;
  document.getElementById('rej-pjm-count').textContent = pjmRoles.length;

  const content = document.getElementById('rej-content');
  if (!activeRoles.length) {
    content.innerHTML = `<div class="no-results">No screened-out roles match current filters.</div>`;
    return;
  }
  content.innerHTML = buildRejTableHtml(sorted);
}

// ── Rejected table columns ────────────────────────────────────
const REJ_COLS = [
  { key: 'expand',   label: '',         sortable: false, style: 'width:24px' },
  { key: 'company',  label: 'Company',  sortable: true },
  { key: 'title',    label: 'Role',     sortable: true },
  { key: 'track',    label: 'Track',    sortable: false },
  { key: 'type',     label: 'Type',     sortable: false },
  { key: 'posted',   label: 'Posted',   sortable: true },
  { key: 'salary',   label: 'Salary',   sortable: false },
  { key: 'category', label: 'Reason',   sortable: true },
  { key: 'apply',    label: 'Apply',    sortable: false },
];

function buildRejTableHtml(roles) {
  const colspan = REJ_COLS.length;
  const theadCells = REJ_COLS.map(col => {
    if (!col.sortable) return `<th${col.style ? ` style="${col.style}"` : ''}>${col.label}</th>`;
    const isActive = rejState.sortCol === col.key;
    const icon = isActive ? (rejState.sortDir === 'asc' ? '↑' : '↓') : '↕';
    return `<th class="sortable${isActive ? ' sort-active' : ''}" onclick="handleRejSort('${col.key}')">
      ${col.label}<span class="sort-icon">${icon}</span>
    </th>`;
  }).join('');
  const rows = roles.map(r => rejRowPair(r, colspan)).join('');
  return `<div class="table-scroll"><table><thead><tr>${theadCells}</tr></thead><tbody>${rows}</tbody></table></div>`;
}

function rejRowPair(r, colspan) {
  const id = 'r-' + (r.id || Math.random().toString(36).slice(2));

  const typeMap = {
    'remote':    { label: 'Remote',    cls: 'type-remote' },
    'hybrid':    { label: 'Hybrid',    cls: 'type-hybrid' },
    'in-person': { label: 'In-Person', cls: 'type-inperson' },
  };
  const wt = typeMap[r.work_type_bucket] || { label: r.work_type_bucket || '-', cls: '' };

  const ageTier    = r.age_tier || 'Unknown';
  const postedHtml = `<span class="posted-${ageTier}">${esc(r.posted || 'Unknown')}</span>`;
  const trackBadge = r.track ? `<span class="badge track-${r.track}">${r.track}</span>` : '-';

  const cat      = r.reason_cat || 'other';
  const catLabel = REJ_CAT_LABELS[cat] || cat;
  const catBadge = `<span class="reason-cat rcat-${cat}">${catLabel}</span>`;

  const mainRow = `
    <tr class="job-row" onclick="toggleRej('${id}')">
      <td><span class="expand-icon" id="icon-${id}">▶</span></td>
      <td>
        <div class="company-name">${esc(r.company)}</div>
        <div class="location-text">${esc(r.location || '')}</div>
      </td>
      <td><div class="role-title">${esc(r.role_title)}</div></td>
      <td>${trackBadge}</td>
      <td><span class="badge ${wt.cls}">${wt.label}</span></td>
      <td>${postedHtml}</td>
      <td><span class="salary${r.salary_unknown ? ' unknown' : ''}">${esc(r.salary || 'Not listed')}</span></td>
      <td>${catBadge}</td>
      <td>${r.apply_url
        ? `<a class="apply-link" href="${r.apply_url}" target="_blank" onclick="event.stopPropagation()">Apply →</a>`
        : '<span style="color:var(--muted);font-size:12px">-</span>'}
      </td>
    </tr>`;

  const detailRow = `
    <tr class="detail-row" id="detail-${id}">
      <td colspan="${colspan}" class="rej-detail-cell">
        <div class="rej-reason-full">✗ ${esc(r.reason || '-')}</div>
        ${r.notes ? `<div class="rej-notes">${esc(r.notes)}</div>` : ''}
      </td>
    </tr>`;

  return mainRow + detailRow;
}

// ═══════════════════════════════════════════════════════════════
// SORT
// ═══════════════════════════════════════════════════════════════
function sortRoles(roles, col, dir) {
  return [...roles].sort((a, b) => {
    let va, vb;
    switch (col) {
      case 'company': va = a.company.toLowerCase();    vb = b.company.toLowerCase();    break;
      case 'title':   va = a.role_title.toLowerCase(); vb = b.role_title.toLowerCase(); break;
      case 'posted':  va = a.posted_days ?? 999;       vb = b.posted_days ?? 999;       break;
      case 'grade':   va = GRADE_ORDER[a.grade] ?? 99; vb = GRADE_ORDER[b.grade] ?? 99; break;
      case 'score':   va = -(a.weighted_score ?? 0);   vb = -(b.weighted_score ?? 0);   break;
      default:        va = 0; vb = 0;
    }
    if (va < vb) return dir === 'asc' ? -1 : 1;
    if (va > vb) return dir === 'asc' ?  1 : -1;
    const ga = GRADE_ORDER[a.grade] ?? 99, gb = GRADE_ORDER[b.grade] ?? 99;
    if (ga !== gb) return ga - gb;
    return a.company.toLowerCase() < b.company.toLowerCase() ? -1 : 1;
  });
}

function sortRejRoles(roles) {
  const col = rejState.sortCol, dir = rejState.sortDir;
  return [...roles].sort((a, b) => {
    let va, vb;
    switch (col) {
      case 'company':  va = a.company.toLowerCase();    vb = b.company.toLowerCase();    break;
      case 'title':    va = a.role_title.toLowerCase(); vb = b.role_title.toLowerCase(); break;
      case 'posted':   va = a.posted_days ?? 999;       vb = b.posted_days ?? 999;       break;
      case 'category': va = REJ_CAT_ORDER.indexOf(a.reason_cat ?? 'other');
                       vb = REJ_CAT_ORDER.indexOf(b.reason_cat ?? 'other');
                       if (va < 0) va = 99; if (vb < 0) vb = 99;              break;
      default:         va = 0; vb = 0;
    }
    if (va < vb) return dir === 'asc' ? -1 : 1;
    if (va > vb) return dir === 'asc' ?  1 : -1;
    return a.company.toLowerCase() < b.company.toLowerCase() ? -1 : 1;
  });
}

function handleRejSort(col) {
  if (rejState.sortCol === col) {
    rejState.sortDir = rejState.sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    rejState.sortCol = col;
    rejState.sortDir = 'asc';
  }
  renderRejectedSection();
}

// ═══════════════════════════════════════════════════════════════
// EVENT HANDLERS
// ═══════════════════════════════════════════════════════════════
function handleSort(sectionId, col) {
  const ss = sectionState[sectionId];
  if (ss.sortCol === col) {
    ss.sortDir = ss.sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    ss.sortCol = col;
    ss.sortDir = 'asc';
  }
  const buckets = { remote: 'remote', hybrid: 'hybrid', inperson: 'in-person' };
  renderSection(sectionId, buckets[sectionId]);
}

function handleTab(sectionId, tab) {
  sectionState[sectionId].tab = tab;
  const buckets = { remote: 'remote', hybrid: 'hybrid', inperson: 'in-person' };
  renderSection(sectionId, buckets[sectionId]);
}

function toggle(id) {
  const detailRow = document.getElementById('detail-' + id);
  if (!detailRow) return;
  const jobRow = detailRow.previousElementSibling;
  const icon   = document.getElementById('icon-' + id);
  const open   = detailRow.classList.contains('visible');
  if (open) {
    detailRow.classList.remove('visible');
    if (jobRow) jobRow.classList.remove('expanded');
    if (icon)   icon.style.transform = '';
  } else {
    detailRow.classList.add('visible');
    if (jobRow) jobRow.classList.add('expanded');
    if (icon)   icon.style.transform = 'rotate(90deg)';
  }
}

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
function chip(label, val, color) {
  const valHtml = color
    ? `<span class="val" style="color:${color}">${val}</span>`
    : `<span class="val">${val}</span>`;
  return `<div class="stat-chip">${label} ${valHtml}</div>`;
}

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
