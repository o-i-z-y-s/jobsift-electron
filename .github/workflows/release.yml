name: Release

# Build and publish installers when a version tag (e.g. v0.1.0) is pushed.
# electron-builder uploads the artifacts to a GitHub Release using the publish
# block in electron-builder.yml (owner/repo) and the GITHUB_TOKEN below.
on:
  push:
    tags:
      - "v*"

# Needed so electron-builder can create/update the GitHub Release.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win
          - os: macos-latest
            target: mac
    runs-on: ${{ matrix.os }}

    steps:
      # SECURITY: third-party actions are pinned to full commit SHAs (the version
      # in the trailing comment is for humans). To bump, look up the new release's
      # commit SHA and update both the SHA and the comment together.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: "npm"

      # Reproducible install from the audited package-lock.json. Install scripts
      # are required here so Electron downloads its prebuilt binary for the build.
      - name: Install dependencies
        run: npm ci

      - name: Build and publish (${{ matrix.target }})
        run: npx --no-install electron-builder --${{ matrix.target }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No Apple/Windows signing certificates are configured, so do not try
          # to auto-discover one (prevents the macOS build from failing).
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
