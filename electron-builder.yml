appId: com.jobsift.app
productName: JobSift

directories:
  output: dist

files:
  - src/**
  - ui/**
  - assets/**
  - resources/**
  - package.json

win:
  target:
    - target: nsis
      arch: [x64]
  icon: assets/jobsift-icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: assets/jobsift-icon.ico
  uninstallerIcon: assets/jobsift-icon.ico

mac:
  target:
    - target: dmg
  icon: assets/jobsift-icon.icns
  category: public.app-category.productivity

publish:
  provider: github
  owner: o-i-z-y-s
  repo: jobsift-electron
